<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <div class="sidenav-header">
      <h2>HumanForge AI</h2>
      <p class="tagline">Analyze. Improve. Humanize.</p>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/upload" routerLinkActive="active">
        <mat-icon>upload_file</mat-icon>
        <span>Upload File</span>
      </a>
      <a mat-list-item routerLink="/humanize" routerLinkActive="active">
        <mat-icon>edit</mat-icon>
        <span>AI Humanizer</span>
      </a>
      <a mat-list-item routerLink="/review" routerLinkActive="active">
        <mat-icon>rate_review</mat-icon>
        <span>Document Review</span>
      </a>
      <a mat-list-item routerLink="/code-analysis" routerLinkActive="active">
        <mat-icon>code</mat-icon>
        <span>Code Analysis</span>
      </a>
      <a mat-list-item routerLink="/resume" routerLinkActive="active">
        <mat-icon>work</mat-icon>
        <span>Resume Optimizer</span>
      </a>
      <a mat-list-item routerLink="/analytics" routerLinkActive="active">
        <mat-icon>analytics</mat-icon>
        <span>Analytics</span>
      </a>
      <a mat-list-item routerLink="/versions" routerLinkActive="active">
        <mat-icon>history</mat-icon>
        <span>Version History</span>
      </a>
      <a mat-list-item routerLink="/export" routerLinkActive="active">
        <mat-icon>download</mat-icon>
        <span>Export</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="app-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
