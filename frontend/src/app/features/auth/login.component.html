<div class="auth-container">
  <mat-card class="auth-card">
    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>Log in to access your saved history</p>
    </div>

    <div class="auth-field">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email" (keyup.enter)="submit()" />
      </mat-form-field>
    </div>

    <div class="auth-field">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" (keyup.enter)="submit()" />
      </mat-form-field>
    </div>

    <div *ngIf="error" class="error-message">
      <mat-icon>error</mat-icon> {{ error }}
    </div>

    <button mat-raised-button color="primary" class="full-width submit-btn" (click)="submit()" [disabled]="loading || !email || !password">
      <mat-icon>{{ loading ? 'hourglass_empty' : 'login' }}</mat-icon>
      {{ loading ? 'Logging in...' : 'Log In' }}
    </button>

    <p class="auth-switch">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </p>
  </mat-card>
</div>
