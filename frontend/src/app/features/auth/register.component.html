<div class="auth-container">
  <mat-card class="auth-card">
    <div class="auth-header">
      <h1>Create an account</h1>
      <p>Save your humanize, review, code, and resume history</p>
    </div>

    <div class="auth-field">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput [(ngModel)]="name" (keyup.enter)="submit()" />
      </mat-form-field>
    </div>

    <div class="auth-field">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email" (keyup.enter)="submit()" />
      </mat-form-field>
    </div>

    <div class="auth-field">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" (keyup.enter)="submit()" />
      </mat-form-field>
      <span class="hint">At least 8 characters</span>
    </div>

    <div *ngIf="error" class="error-message">
      <mat-icon>error</mat-icon> {{ error }}
    </div>

    <button mat-raised-button color="primary" class="full-width submit-btn" (click)="submit()" [disabled]="loading || !name || !email || !password">
      <mat-icon>{{ loading ? 'hourglass_empty' : 'person_add' }}</mat-icon>
      {{ loading ? 'Creating account...' : 'Sign Up' }}
    </button>

    <p class="auth-switch">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </mat-card>
</div>
