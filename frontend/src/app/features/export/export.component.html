<div class="export-container">
  <div class="page-header">
    <h1>Export</h1>
    <p>Export any text content to PDF, Word, Markdown, plain text, or HTML</p>
  </div>

  <mat-card class="input-card">
    <mat-card-header>
      <mat-card-title>Content</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <textarea [(ngModel)]="content" class="text-input" rows="10" placeholder="Paste content to export..."></textarea>

      <div class="options-row">
        <mat-form-field appearance="outline" class="field">
          <mat-label>Filename</mat-label>
          <input matInput [(ngModel)]="filename" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="field">
          <mat-label>Title (optional)</mat-label>
          <input matInput [(ngModel)]="title" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="field small">
          <mat-label>Format</mat-label>
          <mat-select [(ngModel)]="selectedFormat">
            <mat-option *ngFor="let f of formats" [value]="f.value">{{ f.label }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="export()" [disabled]="exporting || !content.trim() || !filename.trim()">
        <mat-icon>{{ exporting ? 'hourglass_empty' : 'download' }}</mat-icon>
        {{ exporting ? 'Exporting...' : 'Export' }}
      </button>
    </mat-card-actions>
  </mat-card>

  <div *ngIf="error" class="error-message">
    <mat-icon>error</mat-icon> {{ error }}
  </div>

  <mat-card class="result-card" *ngIf="result">
    <mat-card-content>
      <div class="result-row">
        <mat-icon class="success-icon">check_circle</mat-icon>
        <div class="result-info">
          <span class="result-filename">{{ result.filename }}</span>
          <span class="result-meta">{{ result.format.toUpperCase() }} &middot; {{ (result.size / 1024).toFixed(1) }} KB</span>
        </div>
        <a mat-raised-button color="primary" [href]="downloadUrl()" download>
          <mat-icon>file_download</mat-icon> Download
        </a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
