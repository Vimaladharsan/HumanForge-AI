<div class="dashboard-container">
  <h1>Welcome to HumanForge AI</h1>
  <p class="subtitle">Your Universal AI Document & Code Intelligence Platform</p>
  
  <div class="stats-grid">
    <mat-card class="stat-card">
      <mat-card-header>
        <mat-card-title>Documents Processed</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="stat-value">0</div>
      </mat-card-content>
    </mat-card>
    
    <mat-card class="stat-card">
      <mat-card-header>
        <mat-card-title>Code Files Analyzed</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="stat-value">0</div>
      </mat-card-content>
    </mat-card>
    
    <mat-card class="stat-card">
      <mat-card-header>
        <mat-card-title>AI Suggestions</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="stat-value">0</div>
      </mat-card-content>
    </mat-card>
    
    <mat-card class="stat-card">
      <mat-card-header>
        <mat-card-title>Exports Generated</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="stat-value">0</div>
      </mat-card-content>
    </mat-card>
  </div>
  
  <div class="quick-actions">
    <h2>Quick Actions</h2>
    <div class="actions-grid">
      <button mat-raised-button color="primary" routerLink="/upload">
        <mat-icon>upload_file</mat-icon>
        Upload File
      </button>
      <button mat-raised-button color="accent" routerLink="/humanize">
        <mat-icon>edit</mat-icon>
        Humanize Text
      </button>
      <button mat-raised-button color="warn" routerLink="/code-analysis">
        <mat-icon>code</mat-icon>
        Analyze Code
      </button>
      <button mat-raised-button routerLink="/review">
        <mat-icon>rate_review</mat-icon>
        Review Document
      </button>
    </div>
  </div>
</div>
